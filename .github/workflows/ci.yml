name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cp .env.example .env
      - run: npm test -- --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/vpn-panel-test
          REDIS_URL: redis://localhost:6379
          BOT_TOKEN: test-bot-token
          JWT_SECRET: test-jwt-secret-at-least-32-chars-long-for-testing
          JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-chars-long-for-test
          ADMIN_API_KEY: test-admin-api-key
          NODE_SECRET: test-node-secret-at-least-16-chars

  docker:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t hornet-backend:${{ github.sha }} .
      - name: Tag release
        run: |
          docker tag hornet-backend:${{ github.sha }} hornet-backend:latest
          echo "Built hornet-backend:latest"
      # Uncomment and configure for registry push:
      # - name: Login to Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - name: Push images
      #   run: |
      #     docker push ghcr.io/${{ github.repository }}/hornet-backend:${{ github.sha }}
      #     docker push ghcr.io/${{ github.repository }}/hornet-backend:latest
