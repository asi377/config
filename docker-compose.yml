services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongo_data:/data/db
    networks:
      - hornet-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - hornet-net
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:?}@mongodb:27017/vpn-panel?authSource=admin
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - BACKEND_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - "3000:3000"
    networks:
      - hornet-net
    healthcheck:
      test: curl -fs http://localhost:3000/health || exit 1
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - hornet-net
    depends_on:
      backend: { condition: service_started }

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_INSTALL_PLUGINS=
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - hornet-net
    depends_on:
      prometheus: { condition: service_started }

volumes:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  hornet-net:
    driver: bridge
