services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    # Single-node replica set so multi-document transactions (payments, billing,
    # provisioning) work. The keyfile secures replica-set internal auth; it is
    # copied to a private path and chowned at startup because bind-mounted files
    # keep host ownership/permissions that mongod rejects.
    command:
      - bash
      - -c
      - |
        cp /etc/mongo-keyfile-src /tmp/mongo-keyfile
        chmod 400 /tmp/mongo-keyfile
        chown mongodb:mongodb /tmp/mongo-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/mongo-keyfile --bind_ip_all
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-keyfile:/etc/mongo-keyfile-src:ro
    networks:
      - hornet-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000 --appendfsync everysec --auto-aof-rewrite-percentage 100 --auto-aof-rewrite-min-size 64mb
    volumes:
      - redis_data:/data
    networks:
      - hornet-net
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: .
    init: true
    restart: unless-stopped
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:?}@mongodb:27017/vpn-panel?authSource=admin&replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - hornet-net
    healthcheck:
      test: curl -fs http://localhost:3000/health || exit 1
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - hornet-net
    depends_on:
      backend: { condition: service_started }

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_INSTALL_PLUGINS=
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - hornet-net
    depends_on:
      prometheus: { condition: service_started }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hornet-net
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:

networks:
  hornet-net:
    driver: bridge
